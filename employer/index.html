<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>틈타 사장님 - AI 실시간 긴급 구인 매칭</title>
    <!-- Google Fonts & Icon -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../shared/style.css">
</head>
<body class="employer-theme-active">
    <!-- App Container -->
    <div class="app-container">

        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <svg class="coin-clock-icon logo-coin" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="coinGradHeader" cx="35%" cy="30%" r="75%">
                            <stop offset="0%" stop-color="#FFF6E3"/>
                            <stop offset="45%" stop-color="#FFD54F"/>
                            <stop offset="100%" stop-color="#FFB300"/>
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="46" fill="url(#coinGradHeader)" stroke="#FFB300" stroke-width="3"/>
                    <g stroke="#4A341E" stroke-width="4" stroke-linecap="round">
                        <line x1="50" y1="11" x2="50" y2="19"/>
                        <line x1="50" y1="81" x2="50" y2="89"/>
                        <line x1="11" y1="50" x2="19" y2="50"/>
                        <line x1="81" y1="50" x2="89" y2="50"/>
                    </g>
                    <text x="50" y="65" text-anchor="middle" font-size="44" font-weight="800" fill="#4A341E" font-family="Inter, Arial, sans-serif">₩</text>
                </svg>
                <h1>틈타 <span class="logo-beta">사장님</span></h1>
            </div>
            <a href="../seeker/" class="app-switch-link"><i class="fa-solid fa-right-left"></i> 구직자 앱으로</a>
        </header>

        <!-- Notification Bar (Toast) -->
        <div id="notification-container" class="notification-container"></div>

        <!-- Main Content -->
        <main class="app-main">

            <section id="employer-view" class="view-section active">

                <!-- ================= AI Real-time Matching Hero (Landing Screen) ================= -->
                <div class="match-hero employer-theme">

                    <!-- Idle State: gig post form + CTA -->
                    <div id="employer-hero-idle" class="hero-stage hero-idle active">
                        <div class="hero-coin-wrap">
                            <svg class="coin-clock-icon hero-coin" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <radialGradient id="coinGradEIdle" cx="35%" cy="30%" r="75%">
                                        <stop offset="0%" stop-color="#FFF6E3"/>
                                        <stop offset="45%" stop-color="#FFD54F"/>
                                        <stop offset="100%" stop-color="#FFB300"/>
                                    </radialGradient>
                                </defs>
                                <circle cx="50" cy="50" r="46" fill="url(#coinGradEIdle)" stroke="#FFB300" stroke-width="3"/>
                                <g stroke="#4A341E" stroke-width="3.5" stroke-linecap="round">
                                    <line x1="50" y1="11" x2="50" y2="19"/>
                                    <line x1="50" y1="81" x2="50" y2="89"/>
                                    <line x1="11" y1="50" x2="19" y2="50"/>
                                    <line x1="81" y1="50" x2="89" y2="50"/>
                                </g>
                                <text x="50" y="65" text-anchor="middle" font-size="44" font-weight="800" fill="#4A341E" font-family="Inter, Arial, sans-serif">₩</text>
                            </svg>
                        </div>

                        <h2 class="hero-title">3초 긴급 구인</h2>
                        <p class="hero-desc">지금 필요한 일자리를 등록하면<br>AI가 딱 맞는 인재를 실시간으로 찾아드려요</p>

                        <form id="gig-form" class="hero-form" onsubmit="return false;">
                            <div class="hero-form-row hero-form-grid-2">
                                <div>
                                    <label for="gig-title"><i class="fa-solid fa-heading"></i> 모집 직무</label>
                                    <select id="gig-title" required>
                                        <option value="카페 홀 서빙">카페 홀 서빙</option>
                                        <option value="바리스타 보조">바리스타 보조</option>
                                        <option value="레스토랑 식기세척">레스토랑 식기세척</option>
                                        <option value="편의점 물류 분류">편의점 물류 분류</option>
                                        <option value="행사 주차 안내">행사 주차 안내</option>
                                    </select>
                                </div>
                                <div>
                                    <label for="gig-hourly-pay"><i class="fa-solid fa-coins"></i> 시급 (원)</label>
                                    <input type="number" id="gig-hourly-pay" value="12000" min="9860" step="10" required>
                                </div>
                            </div>
                            <div class="hero-form-row hero-form-grid-2">
                                <div>
                                    <label for="gig-date"><i class="fa-solid fa-calendar-day"></i> 근무 날짜</label>
                                    <input type="date" id="gig-date" required>
                                </div>
                                <div>
                                    <label><i class="fa-solid fa-calendar-week"></i> 요일</label>
                                    <div id="gig-day-label" class="day-badge">-</div>
                                </div>
                            </div>
                            <div class="hero-form-row">
                                <label><i class="fa-solid fa-clock"></i> 근무 시간</label>
                                <div class="time-range-picker">
                                    <select id="gig-start-time">
                                        <option value="09:00">오전 09:00</option>
                                        <option value="10:00">오전 10:00</option>
                                        <option value="11:00">오전 11:00</option>
                                        <option value="12:00" selected>오후 12:00</option>
                                        <option value="13:00">오후 01:00</option>
                                        <option value="14:00">오후 02:00</option>
                                        <option value="15:00">오후 03:00</option>
                                        <option value="18:00">오후 06:00</option>
                                    </select>
                                    <span class="time-separator">~</span>
                                    <select id="gig-end-time">
                                        <option value="13:00">오후 01:00</option>
                                        <option value="14:00">오후 02:00</option>
                                        <option value="15:00" selected>오후 03:00</option>
                                        <option value="16:00">오후 04:00</option>
                                        <option value="17:00">오후 05:00</option>
                                        <option value="18:00">오후 06:00</option>
                                        <option value="22:00">오후 10:00</option>
                                    </select>
                                </div>
                            </div>
                            <div class="hero-form-row">
                                <label for="gig-location"><i class="fa-solid fa-location-dot"></i> 근무 장소</label>
                                <select id="gig-location" required>
                                    <option value="강남구 역삼동" selected>강남구 역삼동</option>
                                    <option value="서초구 서초동">서초구 서초동</option>
                                    <option value="마포구 서교동">마포구 서교동</option>
                                    <option value="성동구 성수동">성동구 성수동</option>
                                </select>
                            </div>
                            <div class="hero-form-row">
                                <label for="gig-description"><i class="fa-solid fa-comment-dots"></i> 세부 업무 안내</label>
                                <textarea id="gig-description" rows="2" placeholder="예: 매장 청소, 음료 서빙 지원 등 가벼운 보조 업무입니다."></textarea>
                            </div>
                            <button type="submit" id="btn-post-gig" class="btn-match-cta employer-cta">
                                <i class="fa-solid fa-bolt"></i> AI 인재 매칭 시작하기
                            </button>
                        </form>
                    </div>

                    <!-- Searching State -->
                    <div id="employer-hero-searching" class="hero-stage hero-searching">
                        <div class="radar-stage">
                            <div class="radar-ring r1"></div>
                            <div class="radar-ring r2"></div>
                            <div class="radar-ring r3"></div>
                            <svg class="coin-clock-icon radar-coin" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <radialGradient id="coinGradESearch" cx="35%" cy="30%" r="75%">
                                        <stop offset="0%" stop-color="#FFF6E3"/>
                                        <stop offset="45%" stop-color="#FFD54F"/>
                                        <stop offset="100%" stop-color="#FFB300"/>
                                    </radialGradient>
                                </defs>
                                <circle cx="50" cy="50" r="46" fill="url(#coinGradESearch)" stroke="#FFB300" stroke-width="3"/>
                                <g stroke="#4A341E" stroke-width="3.5" stroke-linecap="round">
                                    <line x1="50" y1="11" x2="50" y2="19"/>
                                    <line x1="50" y1="81" x2="50" y2="89"/>
                                    <line x1="11" y1="50" x2="19" y2="50"/>
                                    <line x1="81" y1="50" x2="89" y2="50"/>
                                </g>
                                <text x="50" y="65" text-anchor="middle" font-size="44" font-weight="800" fill="#4A341E" font-family="Inter, Arial, sans-serif">₩</text>
                            </svg>
                        </div>
                        <p class="hero-status-text">AI가 주변 인재를 찾고 있어요<span class="dot-anim">...</span></p>
                        <p class="hero-status-sub">근무 조건과 딱 맞는 구직자를 분석하고 있어요</p>
                    </div>

                    <!-- Result State -->
                    <div id="employer-hero-result" class="hero-stage hero-result"></div>

                </div>

                <!-- Employer Dashboard -->
                <div class="dashboard-card card employer-theme">
                    <div class="user-profile">
                        <div class="avatar"><i class="fa-solid fa-briefcase"></i></div>
                        <div class="user-info">
                            <span class="user-greeting">언제나 든든한 파트너</span>
                            <span class="user-name">역삼 틈새 카페 사장님</span>
                        </div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <span class="stat-num" id="employer-active-gigs">0</span>
                            <span class="stat-label">등록한 구인</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-num" id="employer-matched-gigs">0</span>
                            <span class="stat-label">매칭된 인원</span>
                        </div>
                    </div>
                </div>

                <!-- My Gigs List -->
                <div class="employer-jobs-section">
                    <h3><i class="fa-solid fa-list-check icon-navy"></i> 실시간 등록 및 매칭 관리</h3>
                    <div id="employer-gig-list" class="jobs-list">
                        <!-- Dynamic Content via JS -->
                    </div>
                </div>

            </section>
        </main>

        <!-- Debug / Simulator Controller Utility Panel -->
        <footer class="simulator-panel card">
            <div class="simulator-header">
                <span>🛠️ MVP 시뮬레이터 옵션</span>
                <button id="btn-toggle-sim" class="btn-icon"><i class="fa-solid fa-chevron-up"></i></button>
            </div>
            <div id="sim-body" class="simulator-body active">
                <p>MVP 검증을 원활하게 하기 위한 가상 데이터 매칭 시뮬레이터입니다. 구직자 앱을 다른 탭에서 열어두면 실시간으로 서로 연동됩니다.</p>
                <div class="sim-actions">
                    <button id="btn-sim-add-jobs" class="btn-secondary">
                        <i class="fa-solid fa-magic"></i> 가상 구인 공고 3개 생성
                    </button>
                    <button id="btn-sim-reset" class="btn-danger">
                        <i class="fa-solid fa-trash"></i> 전체 데이터 초기화
                    </button>
                </div>
            </div>
        </footer>

    </div>

    <!-- Application Logic -->
    <script src="../shared/seekers.js"></script>
    <script src="../shared/matching.js"></script>
    <script src="../shared/db.js"></script>
    <script src="app.js"></script>
</body>
</html>
