<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>틈타 - AI 실시간 틈새 알바 매칭</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-area">
                <svg class="coin-clock-icon logo-coin" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="coinGradHeader" cx="35%" cy="30%" r="75%">
                            <stop offset="0%" stop-color="#FFF6E3"/>
                            <stop offset="45%" stop-color="#FFD54F"/>
                            <stop offset="100%" stop-color="#FFB300"/>
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="46" fill="url(#coinGradHeader)" stroke="#FFB300" stroke-width="3"/>
                    <g stroke="#4A341E" stroke-width="4" stroke-linecap="round">
                        <line x1="50" y1="11" x2="50" y2="19"/>
                        <line x1="50" y1="81" x2="50" y2="89"/>
                        <line x1="11" y1="50" x2="19" y2="50"/>
                        <line x1="81" y1="50" x2="89" y2="50"/>
                    </g>
                    <text x="50" y="65" text-anchor="middle" font-size="44" font-weight="800" fill="#4A341E" font-family="Inter, Arial, sans-serif">₩</text>
                </svg>
                <h1>틈타 <span class="logo-beta">MVP</span></h1>
            </div>
        </header>

        <main class="app-main">
            <div class="chooser-hero">
                <h2 class="hero-title">틈타에 오신 것을 환영해요</h2>
                <p class="hero-desc">구직자용 앱과 사장님용 앱이 따로 있어요.<br>실제 출시 구조와 동일하게, 아래에서 사용할 앱을 선택해주세요.</p>

                <a href="seeker/" class="chooser-card">
                    <div class="chooser-icon"><i class="fa-solid fa-user"></i></div>
                    <div class="chooser-text">
                        <span class="chooser-label">구직자로 시작하기</span>
                        <span class="chooser-sub">내 시간에 맞는 알바를 AI가 실시간으로 매칭</span>
                    </div>
                    <i class="fa-solid fa-chevron-right chooser-arrow"></i>
                </a>

                <a href="employer/" class="chooser-card employer">
                    <div class="chooser-icon"><i class="fa-solid fa-briefcase"></i></div>
                    <div class="chooser-text">
                        <span class="chooser-label">사장님으로 시작하기</span>
                        <span class="chooser-sub">급한 자리를 3초 만에 등록하고 실시간 매칭</span>
                    </div>
                    <i class="fa-solid fa-chevron-right chooser-arrow"></i>
                </a>

                <p class="chooser-note"><i class="fa-solid fa-circle-info"></i> 두 앱을 각각 다른 브라우저 탭에서 열어두면, 실제 매칭처럼 서로 실시간으로 연동됩니다.</p>
            </div>
        </main>
    </div>
</body>
</html>
